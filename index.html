<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ICARUS - พิกัดเกิดสมบูรณ์</title>
    <style>
        /* สไตล์แบบ Minimalist สำหรับนักเขียน */
        body { background: #1a1a1a; color: #d1d1d1; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; padding: 20px; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; }
        #user-input { background: #2a2a2a; border: none; color: white; padding: 15px; width: 100%; border-radius: 5px; margin-top: 10px; }
        .bot-msg { color: #88ccff; margin-bottom: 15px; line-height: 1.6; }
        .user-msg { color: #ffffff; text-align: right; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="user-input" placeholder="พิมพ์เพื่อกะเทาะความจริง...">
    </div>

    <script>
        const API_KEY = "ใส่_API_KEY_ของคุณที่นี่";
        const MODEL_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-robotics-er-1.5-preview:generateContent?key=" + API_KEY;

        const input = document.getElementById('user-input');
        const msgContainer = document.getElementById('messages');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = input.value;
                appendMsg(text, 'user-msg');
                input.value = '';

                // เรียกใช้ API (Robotics-ER)
                const response = await fetch(MODEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                        // หมายเหตุ: อย่าลืมใส่ System Instruction ที่เรากะเทาะกันไว้ใน AI Studio ด้วยนะครับ
                    })
                });
                
                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                appendMsg(botReply, 'bot-msg');
            }
        });

        function appendMsg(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            msgContainer.appendChild(div);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
    </script>
</body>
</html>
